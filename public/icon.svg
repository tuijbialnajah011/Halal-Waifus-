<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#262626" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
    <linearGradient id="primary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e879f9" />
      <stop offset="50%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bg-gradient)" />
  
  <!-- Outer glowing rings -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#primary-gradient)" stroke-width="8" opacity="0.4" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#primary-gradient)" stroke-width="4" opacity="0.6"/>

  <!-- Stylized Lotus / Sakura shape -->
  <path d="M 256 120 C 270 200, 320 220, 396 256 C 320 292, 270 312, 256 396 C 242 312, 192 292, 116 256 C 192 220, 242 200, 256 120 Z" fill="url(#primary-gradient)" opacity="0.2" filter="url(#glow)" />
  <path d="M 256 140 C 265 210, 305 230, 376 256 C 305 282, 265 302, 256 376 C 247 302, 207 282, 136 256 C 207 230, 247 210, 256 140 Z" fill="url(#primary-gradient)" opacity="0.9" />

  <!-- The elegant 'H' logomark -->
  <g filter="url(#glow)">
    <path d="M 215 210 L 215 302 M 297 210 L 297 302 M 215 256 L 297 256" stroke="#ffffff" stroke-width="36" stroke-linecap="round" stroke-linejoin="round" />
  </g>
  <path d="M 215 210 L 215 302 M 297 210 L 297 302 M 215 256 L 297 256" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
</svg>
